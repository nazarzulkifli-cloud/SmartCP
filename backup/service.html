<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMARTCountPro Service Desk</title>
<link rel="manifest"href="/manifest.json">
<meta name="theme-color"
content="#39ff14">

<style>

body{
  background:#0d1117;
  color:#ffffff;
  font-family:Consolas,monospace;
  margin:0;
  padding:20px;
}

.card{
  max-width:700px;
  margin:auto;
  background:#161b22;
  padding:20px;
  border-radius:12px;
  border:1px solid #30363d;
}

h2{
  color:#3fb950;
  text-align:center;
  margin-bottom:20px;
}

.info{
  color:#58a6ff;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:14px;
  margin-bottom:5px;
  color:#ffd33d;
  font-weight:bold;
}

input,
textarea{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border:1px solid #30363d;
  border-radius:6px;
  background:#010409;
  color:#ffffff;
  font-size:16px;
}

input[readonly]{
  background:#0d1117;
}

textarea{
  resize:vertical;
}

button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:6px;
  background:#3fb950;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

#status{
  margin-top:15px;
  color:#58a6ff;
  text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>SCP SERVICE DESK</h2>


<div id="headerMesin"
style="
background:#0d1117;
border:1px solid #30363d;
padding:15px;
border-radius:8px;
margin-bottom:15px;
">

<div id="headerPelanggan"
style="
color:#58a6ff;
font-size:32px
font-weight:bold;
">
loading...
</div>

<div id="headerMesinInfo"
style="
color.#ffffff;
margin-top:10px;
">
-
</div>
</div>

<input id="mesin" readonly type="hidden">

<input id="pelanggan" readonly type="hidden">
<label>Nama Pelapor</label>
<input id="contact">
<label>No WhatsApp</label>
<input id="wa">
<label>Keluhan</label>
<textarea 
id="keluhan" 
rows="4"
onkeydown="cekEnter(event)"></textarea>
<div style="
padding:10px;
background:#0d1117;
border:1px solid #30363d;
border-radius:6px;
color:#58a6ff;
">
Foto kerusakan akan dikirim via WhatsApp setelah Tiket dibuat.
</div>

<button 
id="btnCreateTicket"onclick="createTicket()">
CREATE TICKET
</button>

<div id="status"></div>

</div>

<script>
let ticketSudahAda=false;
let ticketId="";
let namaPelanggan="";
let namaPelapor="";
let nomorWA="";

const WEBAPP =
"https://script.google.com/macros/s/AKfycbwh4Da16mogjt_abC-CMvY-eOK2BUyeUEhgXstMqB2gQ4kbgNsx0XFB_adMqnfujumn/exec";

const params =
new URLSearchParams(window.location.search);

const noMesin =
params.get("noMesin") || "";

async function loadMesin(){

  try{

    const res = await fetch(
      WEBAPP +
      "?action=getMesin" +
      "&noMesin=" +
      encodeURIComponent(noMesin)
    );

    const data = await res.json();

    console.log(data);
	console.log("Pelanggan =",data.pelanggan);
	console.log("mesin =",data.noMesin);
   
   if(data.success){
	namaPelanggan=data.pelanggan||"";
	namaPelapor=data.contact||"";
	nomorWA=data.wa||"";
    document.getElementById("mesin").value =
      data.noMesin || "";
    document.getElementById("pelanggan").value =
	  data.pelanggan || "";
	document.getElementById("headerPelanggan").innerText=
		data.pelanggan || "-";
	document.getElementById("headerMesinInfo").innerText=
		"SN: "+(data.noMesin || "-");
    document.getElementById("contact").value =
      data.contact || "";
    document.getElementById("wa").value =
      data.wa || "";
    }

  }catch(err){
  btn.disabled=false;
  btn.innerHTML="CREATE TICKET";
  btn.style.opacity="1";

    console.error(err);

  }

}
function cekEnter(e){
if(e.key ==="Enter"&&!e.shiftkey){
e.preventDefault();
document.getElementById("btnCreateTicket").focus();
}
}

function fileToBase64(file){

  return new Promise((resolve,reject)=>{

    const reader =
    new FileReader();

    reader.onload =
    () => resolve(reader.result);

    reader.onerror =
    reject;

    reader.readAsDataURL(file);

  });

}
function pilihFoto(){
document.getElementById("foto1").click();
}

async function uploadFoto(){
  try{
    const file =
      document.getElementById("foto1").files[0];
    if(!file){
      return null;
    }
    const base64 = await fileToBase64(file);
    const pelanggan =namaPelanggan;
    const res = await fetch(
      WEBAPP,{
        method:"POST",
		//mode:"no-cors",
          body:JSON.stringify({
          action:"uploadPhoto",
		  ticketId:ticketId,
		  noMesin:noMesin,
          pelanggan:pelanggan,
          fileName:file.name,
          mimeType:file.type,
          base64:base64
        })
      }
    );
	alert("Request upload sent");
   const hasil = await res.json();
	//alert(JSON.stringify(hasil));
    console.log("UPLOAD RESULT",hasil);
	if(hasil.success){
	//alert(ticketId);
	//alert(namaPelanggan);
	//alert(noMesin);
	//alert(hasil.url);
	const pesan=`
	Nota Permintaan Teknisi
	no Tiket: ${ticketId}
	Pelanggan: ${namaPelanggan}
	No Mesin: ${noMesin}
	Link Foto: ${hasil.url}`;
	//alert(pesan);
	console.log(pesan);
	window.open("https://wa.me/62818903113?text="+
	encodeURIComponent(pesan),
	"_blank"
	);
	}
    return hasil;
  }catch(err){
      console.error(err);
	  alert("upload foto gagal");
    return null;
  }
}



async function createTicket(){

  try{
if(!contact.value.trim()){
alert("Nama Pelapor wajib diisi");
contact.focus();
return;
}
if(!wa.value.trim()){
alert("No WhatsApp wajib diisi");
wa.focus;
return;
}
if(!keluhan.value.trim()){
alert("Keluhan wajib diisi");
keluhan.focus();
return;
}
    console.log("CREATE TICKET START");
	const btn=
	document.getElementById("btnCreateTicket");
	btn.disabled=true;
	btn.innerHTML="Membuat Tiket...";
	btn.style.opacity="0.6";
    
    status.innerHTML =
    "Memproses...";

    await fetch(

      WEBAPP +
      "?action=updateContact" +
      "&noMesin=" +
      encodeURIComponent(noMesin) +
      "&contact=" +
      encodeURIComponent(contact.value) +
      "&wa=" +
      encodeURIComponent(wa.value)

    );

    status.innerHTML =
    "Membuat tiket...";

    const res =
    await fetch(

      WEBAPP +
      "?action=createTicket" +
      "&noMesin=" +
      encodeURIComponent(noMesin) +
	  "&pelanggan=" +
	  encodeURIComponent(pelanggan.value)+
      "&pelapor=" +
      encodeURIComponent(contact.value) +
      "&noWa=" +
      encodeURIComponent(wa.value) +
      "&keluhan=" +
      encodeURIComponent(keluhan.value) 
   
    

    );

    const hasil =
    await res.json();
	ticketId=hasil.ticketId || hasil.noTicket || "";
    console.log(hasil);
	if(hasil.statusTiket==="OPEN"){
	ticketSudahAda=true;

    status.innerHTML =
    hasil.message || "Selesai";
}
    if(hasil.success){

      tampilNota();

    }

  }catch(err){
  btn.disabled=false;
  btn.innerHTML="CREATE TICKET";
  btn.style.opacity="1";

    console.error(err);

    alert(
      "Error : " + err
    );

  }

}

function tampilNota(){

const notaHTML=`
<div style="
background:#ffffff;
color:#000000;
padding:15px;
border:3px double #000;
border-radius:10px;
font-family:'Courier New', monospace;
font-size:8px;
line-height:1.1;
text-align:left;
white-space:pre-wrap;
">
<center>
========================================================<br>
NOTA PERMINTAAN TEKNISI<br>
========================================================<br>
</center>
<br>
No Tiket: ${ticketId || "-"}<br>
Tanggal Permintaan: ${new Date().toLocaleDateString('id-ID')}<br>
Jam: ${new Date().toLocaleTimeString('id-ID')}<br>
pelanggan: ${pelanggan.value}<br>
No mesin: ${noMesin}<br>
Pelapor: ${contact.value}<br>
No WA: ${wa.value}<br>
--------------------------------------------------------<br>
Pesan Kerusakan: <br>
${keluhan.value}<br>
--------------------------------------------------------<br>
Status Tiket: ${status.value||"OPEN"}<br>
${ticketSudahAda ?`
<div style="
background:#ffe6e6;
border:1px solid red;
padding:10px;
font-weight:bold;
"> TIKET MASIH OPEN
</div>
`:``}
Tiket sudah tercatat.<br>
Silahkan kirim foto kerusakan.<br>
<center>
========================================================<br>
</center>
</div>
<br>
<button onclick="pilihFoto()"
style=" width:100%;
margin-top:15px;
padding:14px;
background:#45c050;
color:white;
border-radius:8px;
font-weight:bold;
font-size:16px;
cursor:pointer;
">
📷 KIRIM FOTO KE ADMIN
</button>
<input
type="file"
id="foto1"
accept="image/*"
capture="environment"
style="display:none"
onchange="uploadFoto()">
`;
document.querySelector(".card").innerHTML = notaHTML;
}

function kirimFotoWA(){
const noAdmin="62818903113";
const pesan=
`No Tiket : ${ticketId}
Pelanggan : ${namaPelanggan}
Pelapor:${namaPelapor}
no WA:${nomorWA}

Saya akan mengirim foto kerusakan `;
window.open(
"https://wa.me/"+noAdmin+
"?text="+
encodeURIComponent(pesan),
"_blank"
);
}
window.onload = loadMesin;
if("serviceWorker" in navigator){
navigator.serviceWorker
.register("/sw.js")
.then(()=>console.log("SW Registered"))
.catch(err=>console.error(err));
}
</script>

</body>
</html>
