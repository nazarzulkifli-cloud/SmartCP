<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMARTCountPro Service Desk</title>

<style>

body{
  background:#0d1117;
  color:#ffffff;
  font-family:Consolas,monospace;
  margin:0;
  padding:20px;
}

.card{
  max-width:700px;
  margin:auto;
  background:#161b22;
  padding:20px;
  border-radius:12px;
  border:1px solid #30363d;
}

h2{
  color:#3fb950;
  text-align:center;
  margin-bottom:20px;
}

.info{
  color:#58a6ff;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:14px;
  margin-bottom:5px;
  color:#ffd33d;
  font-weight:bold;
}

input,
textarea{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border:1px solid #30363d;
  border-radius:6px;
  background:#010409;
  color:#ffffff;
  font-size:16px;
}

input[readonly]{
  background:#0d1117;
}

textarea{
  resize:vertical;
}

button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:6px;
  background:#3fb950;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

#status{
  margin-top:15px;
  color:#58a6ff;
  text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>SCP SERVICE DESK</h2>

<div class="info">
Scan QR berhasil terhubung.
</div>
<div id="headerMesin"
style="
background:#0d1117;
border:1px solid #30363d;
padding:15px;
border-radius:8px;
margin-bottom:15px;
">

<div id="headerPelanggan"
style="
color:#58a6ff;
font-size:32px
font-weight:bold;
">
loading...
</div>

<div id="headerMesinInfo"
style="
color.#ffffff;
margin-top:10px;
">
-
</div>
</div>

<input id="mesin" readonly type="hidden">

<input id="pelanggan" readonly type="hidden">
<label>Nama Pelapor</label>
<input id="contact">
<label>No WhatsApp</label>
<input id="wa">
<label>Keluhan</label>
<textarea id="keluhan" rows="5"></textarea>
<label>Foto Kerusakan</label>
<div style="
padding:10px;
background:#0d1117;
border:1px solid #30363d;
border-radius:6px;
color:#58a6ff;
">
Foto akan dikirim via WhatsApp setelah TICKET dibuat.
</div>

<button onclick="createTicket()">
CREATE TICKET
</button>

<div id="status"></div>

</div>

<script>

const WEBAPP =
"https://script.google.com/macros/s/AKfycbwh4Da16mogjt_abC-CMvY-eOK2BUyeUEhgXstMqB2gQ4kbgNsx0XFB_adMqnfujumn/exec";

const params =
new URLSearchParams(window.location.search);

const noMesin =
params.get("noMesin") || "";

async function loadMesin(){

  try{

    const res = await fetch(
      WEBAPP +
      "?action=getMesin" +
      "&noMesin=" +
      encodeURIComponent(noMesin)
    );

    const data = await res.json();

    console.log(data);
	console.log("Pelanggan =",data.pelanggan);
	console.log("mesin =",data.noMesin);
   
   if(data.success){

      document.getElementById("mesin").value =
      data.noMesin || "";
      document.getElementById("pelanggan").value =
	  data.pelanggan || "";
		document.getElementById("headerPelanggan").innerText=
		data.pelanggan || "-";
		document.getElementById("headerMesinInfo").innerText=
		"SN: "+(data.noMesin || "-");
      document.getElementById("contact").value =
      data.contact || "";
      document.getElementById("wa").value =
      data.wa || "";
    }

  }catch(err){

    console.error(err);

  }

}

function fileToBase64(file){

  return new Promise((resolve,reject)=>{

    const reader =
    new FileReader();

    reader.onload =
    () => resolve(reader.result);

    reader.onerror =
    reject;

    reader.readAsDataURL(file);

  });

}
async function uploadFoto(){

  try{

    const file =
      document.getElementById("foto1").files[0];

    if(!file){
      return null;
    }

    const base64 =
      await fileToBase64(file);

    const pelanggan =
      document.getElementById("pelanggan").value;

    const res = await fetch(
      WEBAPP,
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          action:"uploadPhoto",
          pelanggan:pelanggan,
          fileName:file.name,
          mimeType:file.type,
          base64:base64
        })
      }
    );

    const hasil =
      await res.json();

    console.log("UPLOAD RESULT",hasil);

    return hasil;

  }catch(err){

    console.error(err);

    return null;
  }
}

let ticketId="";

async function createTicket(){

  try{
if(!contact.value.trim()){
alert("Nama Pelapor wajib diisi");
contact.focus();
return;
}
if(!wa.value.trim()){
alert("No WhatsApp wajib diisi");
wa.focus;
return;
}
if(!keluhan.value.trim()){
alert("Keluhan wajib diisi");
keluhan.focus();
return;
}
    console.log("CREATE TICKET START");

    
    status.innerHTML =
    "Memproses...";

    await fetch(

      WEBAPP +
      "?action=updateContact" +
      "&noMesin=" +
      encodeURIComponent(noMesin) +
      "&contact=" +
      encodeURIComponent(contact.value) +
      "&wa=" +
      encodeURIComponent(wa.value)

    );

    status.innerHTML =
    "Membuat tiket...";

    const res =
    await fetch(

      WEBAPP +
      "?action=createTicket" +
      "&noMesin=" +
      encodeURIComponent(noMesin) +
	  "&pelanggan=" +
	  encodeURIComponent(pelanggan.value)+
      "&pelapor=" +
      encodeURIComponent(contact.value) +
      "&noWa=" +
      encodeURIComponent(wa.value) +
      "&keluhan=" +
      encodeURIComponent(keluhan.value) 
   
    

    );

    const hasil =
    await res.json();
ticketId=hasil.ticketId || hasil.noTicket || "";
    console.log(hasil);

    status.innerHTML =
    hasil.message || "Selesai";

    if(hasil.success){

      tampilNota();

    }

  }catch(err){

    console.error(err);

    alert(
      "Error : " + err
    );

  }

}

function tampilNota(){

document.querySelector(".card").innerHTML = `

<h2 style="
color:#39ff14;
text-align:center;
">
NOTA PERMINTAAN SERVICE
</h2>

<div style="
background:#0d1117;
padding:15px;
border:1px solid #30363d;
border-radius:8px;
">

<p>
<b>No Tiket</b><br>
${ticketId}
</p>

<p>
<b>Pelanggan</b><br>
${pelanggan.value}
</p>

<p>
<b>Pelapor</b><br>
${contact.value}
</p>

<p>
<b>No WhatsApp</b><br>
${wa.value}
</p>

<p>
<b>Status</b><br>
OPEN
</p>

</div>

<br>

<button onclick="kirimFotoWA()">
📷 KIRIM FOTO KE ADMIN
</button>

`;

}
function kirimFotoWA(){
const noAdmin="62818903113";
const pesan=
`No Tiket : ${ticketId}
Pelanggan : ${pelanggan.value}
Saya akan mengirim foto kerusakan `;
window.open(
"https://wa.me/"+noAdmin+
"?text="+
encodeURIComponent(pesan),
"_blank"
);
}
window.onload = loadMesin;
</script>

</body>
</html>
